<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#1a1f2e"/>
  <!-- Node graph: central node -->
  <circle cx="16" cy="16" r="3" fill="#d4a843"/>
  <!-- Satellite nodes -->
  <circle cx="7" cy="8" r="2" fill="#4ecdc4"/>
  <circle cx="25" cy="8" r="2" fill="#4ecdc4"/>
  <circle cx="7" cy="24" r="2" fill="#4ecdc4"/>
  <circle cx="25" cy="24" r="2" fill="#4ecdc4"/>
  <!-- Connection lines -->
  <line x1="16" y1="16" x2="7" y2="8" stroke="#d4a843" stroke-width="1" stroke-opacity="0.7"/>
  <line x1="16" y1="16" x2="25" y2="8" stroke="#d4a843" stroke-width="1" stroke-opacity="0.7"/>
  <line x1="16" y1="16" x2="7" y2="24" stroke="#d4a843" stroke-width="1" stroke-opacity="0.7"/>
  <line x1="16" y1="16" x2="25" y2="24" stroke="#d4a843" stroke-width="1" stroke-opacity="0.7"/>
  <!-- Cross connections -->
  <line x1="7" y1="8" x2="25" y2="8" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="7" y1="24" x2="25" y2="24" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="7" y1="8" x2="7" y2="24" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="25" y1="8" x2="25" y2="24" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.4"/>
</svg>